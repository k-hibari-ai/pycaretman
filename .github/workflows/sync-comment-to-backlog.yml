name: Sync Comment to Backlog

on:
  issue_comment:
    types: [created]

permissions:
  issues: read
  contents: read

jobs:
  sync:
    if: >-
      github.event.issue.pull_request == null &&
      !contains(github.event.comment.body, '<!-- from-backlog -->')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Sync GitHub comment → Backlog
        env:
          BACKLOG_API_KEY: ${{ secrets.BACKLOG_API_KEY }}
          BACKLOG_SPACE: hibari-ai.backlog.com
        run: python .github/scripts/sync_comment_to_backlog.py
