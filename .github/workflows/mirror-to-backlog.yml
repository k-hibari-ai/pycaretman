name: Mirror to Backlog

on:
  push:
    branches:
      - "**"
    tags:
      - "**"

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.BACKLOG_SSH_PRIVATE_KEY }}

      - name: Add Backlog known_hosts
        run: |
          ssh-keyscan -H hibari-ai.git.backlog.com >> ~/.ssh/known_hosts

      - name: Add Backlog remote
        run: |
          git remote add backlog hibari-ai@hibari-ai.git.backlog.com:/PRJ_2/pycaretman.git

      - name: Push to Backlog
        run: |
          git push backlog --all
          git push backlog --tags
